<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Boletos — Tribeca S.A.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #161921;
      --bg-card: #1c1f2e;
      --bg-card-hover: #232738;
      --bg-input: #12141c;
      --border: #2a2d3e;
      --border-focus: #5b6abf;
      --text-primary: #e8eaf0;
      --text-secondary: #8b8fa3;
      --text-muted: #5c6078;
      --accent: #6c7bf0;
      --accent-hover: #5b6abf;
      --accent-soft: rgba(108,123,240,0.12);
      --green: #4ade80;
      --green-soft: rgba(74,222,128,0.12);
      --red: #f87171;
      --red-soft: rgba(248,113,113,0.12);
      --yellow: #fbbf24;
      --yellow-soft: rgba(251,191,36,0.12);
      --orange: #fb923c;
      --sidebar-width: 260px;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --transition: 0.2s ease;
    }

    html { font-size: 14px; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: var(--accent); text-decoration: none; }

    /* ========== LAYOUT ========== */
    .app { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform var(--transition);
    }
    .sidebar-header {
      padding: 20px 18px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-version {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .sidebar-brand {
      margin-top: 10px;
      padding: 6px 12px;
      background: #000;
      border-radius: 6px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 1.5px;
      font-family: 'Georgia', serif;
    }
    .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
    .nav-section {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 16px 10px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all var(--transition);
      font-weight: 500;
      font-size: 0.92rem;
    }
    .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav-item.active {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .nav-icon { font-size: 1.15rem; width: 22px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
    }

    /* User card */
    .sidebar-user {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent-soft);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; color: var(--accent);
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 0.72rem; color: var(--text-muted); }

    /* Main content */
    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      min-height: 100vh;
    }

    /* Topbar */
    .topbar {
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title { font-weight: 600; font-size: 1.05rem; }
    .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
    .menu-toggle {
      display: none;
      background: none; border: none; color: var(--text-primary);
      font-size: 1.4rem; cursor: pointer; padding: 4px;
    }

    /* Page container */
    .page { padding: 24px; max-width: 1200px; }

    /* ========== COMPONENTS ========== */
    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color var(--transition);
    }
    .card:hover { border-color: var(--border-focus); }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title { font-weight: 600; font-size: 1rem; }

    /* Stat cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .stat-value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
    .stat-sub { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all var(--transition);
      font-family: inherit;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--bg-card); color: var(--text-primary); }
    .btn-danger { background: var(--red-soft); color: var(--red); border-color: transparent; }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-success { background: var(--green-soft); color: var(--green); }
    .btn-success:hover { background: var(--green); color: #000; }
    .btn-sm { padding: 5px 10px; font-size: 0.78rem; }

    /* Inputs */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input, .form-select {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.92rem;
      transition: border-color var(--transition);
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-check {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .form-check input[type="checkbox"] {
      accent-color: var(--accent);
      width: 16px; height: 16px;
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: var(--bg-input);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .progress-green { background: var(--green); }
    .progress-yellow { background: var(--yellow); }
    .progress-red { background: var(--red); }

    /* Badge / Tag */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-green { background: var(--green-soft); color: var(--green); }
    .badge-red { background: var(--red-soft); color: var(--red); }
    .badge-yellow { background: var(--yellow-soft); color: var(--yellow); }
    .badge-muted { background: rgba(92,96,120,0.2); color: var(--text-muted); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    tr:hover td { background: rgba(108,123,240,0.04); }

    /* Urgency colors */
    .urgencia-VENCIDO { color: #fff; background: #333; }
    .urgencia-URGENTE { color: var(--red); }
    .urgencia-PROXIMO { color: var(--yellow); }
    .urgencia-OK { color: var(--green); }
    .urgencia-SIN_FECHA { color: var(--text-muted); }

    /* Boleto card (dashboard) */
    .boleto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }
    .boleto-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .boleto-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .boleto-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .boleto-name { font-weight: 700; font-size: 1.05rem; }
    .boleto-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .boleto-stats {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 12px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .boleto-pct { font-weight: 700; font-size: 1.1rem; }

    /* Sections accordion */
    .seccion-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      color: var(--text-secondary);
    }
    .seccion-header:hover { color: var(--text-primary); }
    .seccion-arrow { transition: transform var(--transition); }
    .seccion-header.open .seccion-arrow { transform: rotate(90deg); }
    .seccion-body { padding-left: 4px; }

    /* Task row */
    .tarea-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 4px;
      border-bottom: 1px solid rgba(42,45,62,0.5);
      font-size: 0.88rem;
    }
    .tarea-row:last-child { border-bottom: none; }
    .tarea-fila {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      opacity: 0.5;
      min-width: 20px;
      text-align: right;
      flex-shrink: 0;
      user-select: all;
    }
    .tarea-check {
      width: 20px; height: 20px;
      border-radius: 4px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .tarea-check.done {
      background: var(--green);
      border-color: var(--green);
      color: #000;
    }
    .tarea-check:hover:not(.done) { border-color: var(--accent); }
    .tarea-texto { flex: 1; }
    .tarea-texto.done { text-decoration: line-through; color: var(--text-muted); }
    .tarea-resp {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(92,96,120,0.15);
      padding: 2px 8px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .tarea-ts {
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Observaciones (from plantilla) */
    .tarea-obs {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 2px;
      line-height: 1.3;
    }

    /* [NEW] Wrapper for meta badges in tarea-row (mobile-friendly) */
    .tarea-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 0.88rem;
      box-shadow: var(--shadow);
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    @keyframes slideIn { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: none; } }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.5; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .modal-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .modal-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 16px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* ========== [NEW] RESPONSIVE — MOBILE ========== */
    @media (max-width: 768px) {
      /* Sidebar */
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .menu-toggle { display: block; }

      /* Spacing */
      .page { padding: 14px 10px; }
      .topbar { padding: 0 12px; gap: 8px; }
      .topbar-actions { gap: 4px; }
      .topbar-actions .btn { padding: 5px 8px; font-size: 0.72rem; }

      /* Stats & Dashboard */
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .stat-card { padding: 12px; }
      .stat-value { font-size: 1.4rem; }
      .boleto-grid { grid-template-columns: 1fr; }
      .boleto-card { padding: 14px; }
      .boleto-stats { gap: 8px; flex-wrap: wrap; font-size: 0.78rem; }
      .card { padding: 14px; }

      /* [NEW] Tablas -> Cards verticales (Equipo, Archivo, Reportes) */
      .table-wrap { overflow-x: visible; }

      .table-wrap table,
      .table-wrap thead,
      .table-wrap tbody,
      .table-wrap th,
      .table-wrap td,
      .table-wrap tr {
        display: block;
      }

      .table-wrap thead { display: none; }

      .table-wrap tr {
        background: var(--bg-card-hover);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        margin-bottom: 10px;
        padding: 10px 12px;
      }
      .table-wrap tr:hover td { background: transparent; }

      .table-wrap td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        border-bottom: 1px solid rgba(42,45,62,0.4);
        font-size: 0.85rem;
      }
      .table-wrap td:last-child { border-bottom: none; }

      .table-wrap td::before {
        content: attr(data-label);
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        flex-shrink: 0;
        margin-right: 10px;
      }

      /* [NEW] Tarea rows wrap en mobile (Mis Tareas + Detalle) */
      .tarea-row {
        flex-wrap: wrap;
        padding: 10px 4px;
        gap: 6px;
      }
      .tarea-fila { min-width: 16px; font-size: 0.6rem; }
      .tarea-texto {
        flex-basis: calc(100% - 60px);
        min-width: 0;
        font-size: 0.85rem;
      }
      .tarea-meta {
        width: 100%;
        padding-left: 36px;
        margin-top: 2px;
        gap: 4px;
      }
      .tarea-resp { font-size: 0.7rem; }
      .tarea-ts { font-size: 0.65rem; }

      /* Seccion header */
      .seccion-header { padding: 10px 0; font-size: 0.88rem; }

      /* Modal */
      .modal-box { padding: 18px; width: 95%; }

      /* Toast */
      .toast-container { bottom: 10px; right: 10px; left: 10px; }
      .toast { font-size: 0.82rem; padding: 10px 14px; }
    }

    /* [NEW] Extra small screens */
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stat-value { font-size: 1.2rem; }
      .boleto-card-header { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🏠 <span>Gestión de Boletos</span></div>
      <div class="sidebar-version">By Tasks-on</div>
      <div class="sidebar-brand">TRIBECA S.A.</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" data-view="dashboard" onclick="navigateTo('dashboard')">
        <span class="nav-icon">📊</span> Dashboard
      </div>
      <div class="nav-item" data-view="mistareas" onclick="navigateTo('mistareas')">
        <span class="nav-icon">📋</span> Mis Tareas
        <span class="nav-badge" id="badge-tareas">0</span>
      </div>
      <div class="nav-section">Gestión</div>
      <div class="nav-item" data-view="crearboleto" onclick="navigateTo('crearboleto')">
        <span class="nav-icon">➕</span> Crear Boleto
      </div>
      <div class="nav-item" data-view="equipo" onclick="navigateTo('equipo')">
        <span class="nav-icon">👥</span> Equipo
      </div>
      <div class="nav-item" data-view="archivo" onclick="navigateTo('archivo')">
        <span class="nav-icon">📦</span> Archivo
      </div>
      <div class="nav-section">Análisis</div>
      <div class="nav-item" data-view="reportes" onclick="navigateTo('reportes')">
        <span class="nav-icon">📈</span> Reportes
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Cargando...</div>
        <div class="user-role" id="user-role">—</div>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>

    <!-- VIEWS -->
    <div id="view-container"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Modal universal -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)modalCancel()">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-btn-cancel" onclick="modalCancel()">Cancelar</button>
      <button class="btn btn-primary" id="modal-btn-ok" onclick="modalOk()">Aceptar</button>
    </div>
  </div>
</div>

<script>

// ============================================================
// API LAYER — GitHub Pages version (fetch POST → Apps Script doPost)
// Formato: { action: 'webFunctionName', params: [...] }
// ============================================================
var API_URL = "https://script.google.com/macros/s/AKfycbxxW93jZ1X49R7R2W3fMkhmNw_ysDRMkrd17_yKO8QDVvVyjN7fV8vISTtBymeP_JlpzA/exec";

function api(action, params) {
  var url = API_URL + '?action=' + encodeURIComponent(action);
  if (params && params.length) {
    url += '&p=' + encodeURIComponent(JSON.stringify(params));
  }
  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) { if (d.error) throw new Error(d.error); return d; });
}

// ============================================================
// MODAL SYSTEM — reemplaza prompt() y confirm()
// ============================================================
var _modalResolve = null;

function showModal(opts) {
  // opts: { title, message, input, inputValue, placeholder, confirmOnly, dangerOk, okText, cancelText }
  return new Promise(function(resolve) {
    _modalResolve = resolve;
    document.getElementById('modal-title').textContent = opts.title || '';
    
    var bodyHtml = '';
    if (opts.message) {
      bodyHtml += '<p style="color:var(--text-secondary);margin-bottom:14px;line-height:1.5">' + opts.message + '</p>';
    }
    if (opts.input) {
      bodyHtml += '<input class="form-input" id="modal-input" placeholder="' + (opts.placeholder || '') + '" value="' + (opts.inputValue || '') + '" autofocus>';
    }
    document.getElementById('modal-body').innerHTML = bodyHtml;
    
    var btnOk = document.getElementById('modal-btn-ok');
    var btnCancel = document.getElementById('modal-btn-cancel');
    btnOk.textContent = opts.okText || 'Aceptar';
    btnOk.className = opts.dangerOk ? 'btn btn-danger' : 'btn btn-primary';
    btnCancel.textContent = opts.cancelText || 'Cancelar';
    
    document.getElementById('modal-overlay').style.display = 'flex';
    
    // Focus input
    setTimeout(function() {
      var inp = document.getElementById('modal-input');
      if (inp) inp.focus();
    }, 100);
  });
}

function modalOk() {
  var inp = document.getElementById('modal-input');
  var val = inp ? inp.value : true;
  document.getElementById('modal-overlay').style.display = 'none';
  if (_modalResolve) _modalResolve(val);
  _modalResolve = null;
}

function modalCancel() {
  document.getElementById('modal-overlay').style.display = 'none';
  if (_modalResolve) _modalResolve(null);
  _modalResolve = null;
}

// Enter = OK, Escape = Cancel
document.addEventListener('keydown', function(e) {
  if (document.getElementById('modal-overlay').style.display !== 'flex') return;
  if (e.key === 'Enter') { e.preventDefault(); modalOk(); }
  if (e.key === 'Escape') { e.preventDefault(); modalCancel(); }
});

// ============================================================
// STATE
// ============================================================
var state = {
  user: null,
  currentView: 'dashboard',
  dashboardData: null,
  boletoDetalle: null,
  sidebarOpen: false
};

// ============================================================
// INIT
// ============================================================
window.onload = function() {
  api('webGetUsuarioActual')
    .then(function(u) {
      state.user = u;
      document.getElementById('user-name').textContent = u.nombre;
      document.getElementById('user-role').textContent = u.rol;
      document.getElementById('user-avatar').textContent = u.nombre ? u.nombre.charAt(0).toUpperCase() : '?';
      navigateTo('dashboard');
      api('webGetMisTareas').then(function(d) {
        document.getElementById('badge-tareas').textContent = d.tareas.length;
      });
    })
    .catch(function(err) {
      showToast('Error de autenticación: ' + err.message, 'error');
    });
};

function refreshBadgeTareas() {
  api('webGetMisTareas').then(function(d) {
    document.getElementById('badge-tareas').textContent = d.tareas.length;
  });
}

// ============================================================
// NAVIGATION
// ============================================================
function navigateTo(view, params) {
  state.currentView = view;

  // Update nav
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.view === view);
  });

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');

  var titles = {
    dashboard: 'Dashboard',
    mistareas: 'Mis Tareas',
    crearboleto: 'Crear Boleto',
    detalle: 'Detalle de Boleto',
    equipo: 'Equipo',
    archivo: 'Archivo',
    reportes: 'Reportes'
  };
  document.getElementById('topbar-title').textContent = titles[view] || '';

  var container = document.getElementById('view-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Cargando...</div>';

  switch(view) {
    case 'dashboard': loadDashboard(); refreshBadgeTareas(); break;
    case 'mistareas': loadMisTareas(); break;
    case 'crearboleto': loadCrearBoleto(); refreshBadgeTareas(); break;
    case 'detalle': loadDetalle(params); break;
    case 'equipo': loadEquipo(); break;
    case 'archivo': loadArchivo(); break;
    case 'reportes': loadReportes(); break;
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type) {
  var container = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || 'success');
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(function() { t.remove(); }, 4000);
}

// ============================================================
// HELPERS
// ============================================================
function urgenciaBadge(u) {
  if (!u) return '';
  var cls = 'badge-muted';
  if (u.nivel === 'VENCIDO' || u.nivel === 'URGENTE') cls = 'badge-red';
  else if (u.nivel === 'PROXIMO') cls = 'badge-yellow';
  else if (u.nivel === 'OK') cls = 'badge-green';
  return '<span class="badge ' + cls + '">' + u.color + ' ' + u.texto + '</span>';
}

function progressBar(pct) {
  var cls = pct >= 70 ? 'progress-green' : (pct >= 40 ? 'progress-yellow' : 'progress-red');
  return '<div class="progress-bar"><div class="progress-fill ' + cls + '" style="width:' + pct + '%"></div></div>';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============================================================
// VIEW: DASHBOARD
// ============================================================
function loadDashboard() {
  api('webGetDashboard').then(renderDashboard).catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function renderDashboard(data) {
  state.dashboardData = data;
  var html = '<div class="page">';

  // Stats
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-label">Boletos activos</div><div class="stat-value">' + data.totalBoletos + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Progreso global</div><div class="stat-value" style="color:var(--accent)">' + data.porcentajeGlobal + '%</div><div class="stat-sub">' + data.totalCompletas + ' / ' + data.totalTareas + ' tareas</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Equipo</div><div class="stat-value">' + data.equipo + '</div><div class="stat-sub">integrantes</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-value" style="color:var(--yellow)">' + (data.totalTareas - data.totalCompletas) + '</div></div>';
  html += '</div>';

  // Topbar actions
  var actions = '';
  if (state.user && state.user.esAdmin) {
    actions += '<button class="btn btn-ghost btn-sm" onclick="webEnviarEmails()">📧 Enviar Emails</button>';
    actions += '<button class="btn btn-ghost btn-sm" onclick="mostrarConfigEmail()">⚙️ Config Email</button>';
  }
  document.getElementById('topbar-actions').innerHTML = actions;

  // Boleto cards
  if (data.boletos.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">📭</div><p>No hay boletos activos</p></div>';
  } else {
    html += '<div class="boleto-grid">';
    for (var i = 0; i < data.boletos.length; i++) {
      var b = data.boletos[i];
      html += '<div class="boleto-card" onclick="navigateTo(\'detalle\',\'' + esc(b.hoja) + '\')">';
      html += '<div class="boleto-card-header">';
      html += '<div><div class="boleto-name">' + esc(b.propiedad) + '</div>';
      html += '<div class="boleto-meta">' + esc(b.lugar || '') + (b.fecha ? ' · ' + esc(b.fecha) : '') + '</div></div>';
      html += urgenciaBadge(b.urgencia);
      html += '</div>';
      html += progressBar(b.porcentaje);
      html += '<div class="boleto-stats">';
      html += '<span class="boleto-pct">' + b.porcentaje + '%</span>';
      html += '<span>' + b.completas + '/' + b.total + ' tareas</span>';
      html += '<span>' + b.secciones + ' secciones</span>';
      if (b.emailHabilitado) html += '<span style="color:var(--green)">📧 ON</span>';
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('view-container').innerHTML = html;
}

function webEnviarEmails() {
  showModal({
    title: '📧 Enviar Emails',
    message: '¿Enviar resumen de tareas pendientes a todo el equipo ahora?',
    okText: 'Enviar'
  }).then(function(val) {
    if (val === null) return;
    showToast('Enviando emails...', 'success');
    api('webEnviarEmails')
      .then(function(r) {
        if (r.success) showToast('✅ ' + r.enviados + ' emails enviados', 'success');
        else showToast('⚠️ ' + r.mensaje, 'error');
      })
      .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
  });
}

function mostrarConfigEmail() {
  // Fetch current trigger status first
  api('webGetTriggerStatus')
    .then(function(status) {
      var bodyHtml = '<div style="margin-bottom:16px">';
      bodyHtml += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">';
      bodyHtml += '<span style="font-size:1.2rem">' + (status.activo ? '🟢' : '🔴') + '</span>';
      bodyHtml += '<span style="color:var(--text-secondary)">';
      bodyHtml += status.activo ? 'Email diario <strong style="color:var(--green)">ACTIVO</strong> — todos los días a las ' + status.hora + ':00 hs.' : 'Email diario <strong style="color:var(--red)">INACTIVO</strong>';
      bodyHtml += '</span></div>';
      bodyHtml += '<div class="form-group"><label class="form-label">Hora de envío (0-23)</label>';
      bodyHtml += '<input class="form-input" id="cfg-hora" type="number" min="0" max="23" value="' + (status.hora || 9) + '" style="width:100px"></div>';
      bodyHtml += '</div>';

      document.getElementById('modal-title').textContent = '⚙️ Configuración de Emails';
      document.getElementById('modal-body').innerHTML = bodyHtml;

      // Custom buttons
      var actionsHtml = '';
      if (status.activo) {
        actionsHtml += '<button class="btn btn-danger btn-sm" onclick="desactivarTrigger()">Desactivar</button>';
      }
      actionsHtml += '<button class="btn btn-ghost" onclick="modalCancel()">Cerrar</button>';
      actionsHtml += '<button class="btn btn-primary" onclick="activarTrigger()">Activar / Actualizar</button>';
      document.querySelector('.modal-actions').innerHTML = actionsHtml;

      document.getElementById('modal-overlay').style.display = 'flex';
      _modalResolve = null; // manual control
    })
    .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function activarTrigger() {
  var hora = document.getElementById('cfg-hora').value;
  document.getElementById('modal-overlay').style.display = 'none';
  // Restore standard modal buttons
  document.querySelector('.modal-actions').innerHTML = '<button class="btn btn-ghost" id="modal-btn-cancel" onclick="modalCancel()">Cancelar</button><button class="btn btn-primary" id="modal-btn-ok" onclick="modalOk()">Aceptar</button>';
  
  api('webActivarTriggerEmail', [parseInt(hora)])
    .then(function(r) {
      if (r.success) showToast('✅ ' + r.mensaje, 'success');
      else showToast('⚠️ ' + r.mensaje, 'error');
    })
    .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function desactivarTrigger() {
  document.getElementById('modal-overlay').style.display = 'none';
  // Restore standard modal buttons
  document.querySelector('.modal-actions').innerHTML = '<button class="btn btn-ghost" id="modal-btn-cancel" onclick="modalCancel()">Cancelar</button><button class="btn btn-primary" id="modal-btn-ok" onclick="modalOk()">Aceptar</button>';
  
  api('webDesactivarTriggerEmail')
    .then(function(r) {
      if (r.success) showToast('✅ ' + r.mensaje, 'success');
      else showToast('⚠️ ' + r.mensaje, 'error');
    })
    .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

// ============================================================
// VIEW: MIS TAREAS — [CHANGED] badges wrapped in .tarea-meta
// ============================================================
function loadMisTareas() {
  document.getElementById('topbar-actions').innerHTML = '';
  api('webGetMisTareas').then(renderMisTareas).catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function renderMisTareas(data) {
  // Update badge
  document.getElementById('badge-tareas').textContent = data.tareas.length;

  var html = '<div class="page">';

  if (data.tareas.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">🎉</div><p>¡No tenés tareas pendientes!</p></div>';
  } else {
    html += '<div class="card"><div class="card-header"><div class="card-title">' + data.tareas.length + ' tareas pendientes</div></div>';

    // Agrupar por boleto
    var grupos = {};
    var ordenBoletos = [];
    for (var i = 0; i < data.tareas.length; i++) {
      var t = data.tareas[i];
      if (!grupos[t.boleto]) {
        grupos[t.boleto] = { propiedad: t.propiedad, lugar: t.lugar, fecha: t.fecha, tareas: [] };
        ordenBoletos.push(t.boleto);
      }
      grupos[t.boleto].tareas.push(t);
    }

    for (var b = 0; b < ordenBoletos.length; b++) {
      var boleto = ordenBoletos[b];
      var g = grupos[boleto];
      html += '<div class="seccion-header" onclick="this.classList.toggle(\'open\');this.nextElementSibling.style.display=this.classList.contains(\'open\')?\'block\':\'none\'">';
      html += '<span class="seccion-arrow">▸</span>';
      html += '<div style="flex:1;min-width:0">';
      html += '<strong>' + esc(g.propiedad || boleto) + '</strong>';
      var meta = [];
      if (g.lugar) meta.push('📍 ' + esc(g.lugar));
      if (g.fecha) meta.push('📅 ' + esc(g.fecha));
      if (meta.length) html += '<div style="font-size:0.75rem;color:var(--text-muted);font-weight:400;margin-top:2px">' + meta.join(' · ') + '</div>';
      html += '</div>';
      html += '<span class="nav-badge">' + g.tareas.length + '</span>';
      html += '</div>';
      html += '<div class="seccion-body" style="display:none">';

      for (var j = 0; j < g.tareas.length; j++) {
        var tarea = g.tareas[j];
        html += '<div class="tarea-row">';
        html += '<span class="tarea-fila">' + tarea.fila + '</span>';
        if (tarea.tipo === 'CHECK') {
          html += '<div class="tarea-check" onclick="completarTareaCheck(\'' + esc(tarea.boleto) + '\',' + tarea.fila + ',this)" title="Completar">✓</div>';
        } else {
          html += '<div class="tarea-check" style="border-color:var(--yellow);font-size:0.7rem;color:var(--yellow)" onclick="promptDato(\'' + esc(tarea.boleto) + '\',' + tarea.fila + ',\'' + esc(tarea.tarea) + '\')" title="Ingresar dato">✎</div>';
        }
        html += '<div class="tarea-texto">' + esc(tarea.tarea);
        if (tarea.observaciones) {
          html += '<div class="tarea-obs">📝 ' + esc(tarea.observaciones) + '</div>';
        }
        html += '</div>';
        // [NEW] Wrapped in tarea-meta for mobile
        html += '<div class="tarea-meta">';
        html += '<span class="badge badge-muted">' + esc(tarea.tipo) + '</span>';
        html += '<span class="tarea-resp">' + esc(tarea.responsable) + '</span>';
        html += '</div>';
        html += '</div>';
      }

      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('view-container').innerHTML = html;
}

function completarTareaCheck(hoja, fila, el) {
  el.classList.add('done');
  el.parentElement.querySelector('.tarea-texto').classList.add('done');
  api('webCompletarTarea', [hoja, fila])
    .then(function(r) {
      if (r.success) { showToast('✅ Tarea completada', 'success'); refreshBadgeTareas(); }
      else showToast('⚠️ ' + r.mensaje, 'error');
    })
    .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function promptDato(hoja, fila, nombreTarea) {
  showModal({
    title: '✏️ Ingresar dato',
    message: nombreTarea,
    input: true,
    placeholder: 'Escribí el valor...',
    okText: 'Guardar'
  }).then(function(valor) {
    if (valor === null) return;
    api('webCompletarTareaDato', [hoja, fila, valor])
      .then(function(r) {
        if (r.success) {
          showToast('✅ Dato grabado', 'success');
          loadMisTareas();
        } else showToast('⚠️ ' + r.mensaje, 'error');
      })
      .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
  });
}

// ============================================================
// VIEW: CREAR BOLETO
// ============================================================
function loadCrearBoleto() {
  document.getElementById('topbar-actions').innerHTML = '';
  api('webGetPlantillas').then(renderCrearBoleto).catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function renderCrearBoleto(plantillas) {
  var html = '<div class="page">';
  html += '<div class="card" style="max-width:560px">';
  html += '<div class="card-header"><div class="card-title">➕ Nuevo Boleto de Compraventa</div></div>';

  html += '<div class="form-group"><label class="form-label">Propiedad *</label>';
  html += '<input class="form-input" id="inp-propiedad" placeholder="Nombre de la propiedad"></div>';

  html += '<div class="form-group"><label class="form-label">Fecha y hora de firma</label>';
  html += '<input class="form-input" id="inp-fecha" type="datetime-local"></div>';

  html += '<div class="form-group"><label class="form-label">Lugar de firma</label>';
  html += '<input class="form-input" id="inp-lugar" placeholder="Ej: Escribanía López"></div>';

  html += '<div class="form-group"><label class="form-label">Crear desde</label>';
  html += '<select class="form-select" id="inp-origen">';
  for (var i = 0; i < plantillas.plantillas.length; i++) {
    html += '<option value="' + esc(plantillas.plantillas[i]) + '">' + esc(plantillas.plantillas[i]) + ' (plantilla)</option>';
  }
  for (var j = 0; j < plantillas.boletos.length; j++) {
    html += '<option value="' + esc(plantillas.boletos[j]) + '">' + esc(plantillas.boletos[j]) + ' (boleto)</option>';
  }
  html += '</select></div>';

  html += '<div class="form-group"><label class="form-check"><input type="checkbox" id="inp-email" checked> Habilitar emails automáticos</label></div>';

  html += '<div class="form-group"><label class="form-label">Emails desde (opcional)</label>';
  html += '<input class="form-input" id="inp-emaildesde" type="date"></div>';

  html += '<div style="margin-top:20px"><button class="btn btn-primary" onclick="submitCrearBoleto()">Crear Boleto</button></div>';

  html += '</div></div>';
  document.getElementById('view-container').innerHTML = html;
}

function submitCrearBoleto() {
  var propiedad = document.getElementById('inp-propiedad').value.trim();
  if (!propiedad) { showToast('⚠️ El nombre es obligatorio', 'error'); return; }

  var fechaRaw = document.getElementById('inp-fecha').value;
  var fecha = '';
  if (fechaRaw) {
    var d = new Date(fechaRaw);
    fecha = ('0'+d.getDate()).slice(-2) + '/' + ('0'+(d.getMonth()+1)).slice(-2) + '/' + d.getFullYear() + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
  }

  var lugar = document.getElementById('inp-lugar').value.trim();
  var emailHab = document.getElementById('inp-email').checked;
  var emailDesde = document.getElementById('inp-emaildesde').value || '';
  if (emailDesde) {
    var ed = new Date(emailDesde);
    emailDesde = ('0'+ed.getDate()).slice(-2) + '/' + ('0'+(ed.getMonth()+1)).slice(-2) + '/' + ed.getFullYear();
  }
  var origen = document.getElementById('inp-origen').value;

  showToast('Creando boleto...', 'success');
  api('webCrearBoleto', [propiedad, fecha, lugar, emailHab, emailDesde, origen])
    .then(function(r) {
      if (r.success) {
        showToast('✅ ' + r.mensaje, 'success');
        navigateTo('dashboard');
      } else {
        showToast('⚠️ ' + r.mensaje, 'error');
      }
    })
    .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

// ============================================================
// VIEW: DETALLE BOLETO — [CHANGED] meta wrapped in .tarea-meta
// ============================================================
function loadDetalle(nombreHoja) {
  document.getElementById('topbar-actions').innerHTML = '';
  api('webGetBoletoDetalle', [nombreHoja]).then(renderDetalle).catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function renderDetalle(data) {
  if (!data.success) {
    document.getElementById('view-container').innerHTML = '<div class="page"><div class="empty-state">' + data.mensaje + '</div></div>';
    return;
  }
  state.boletoDetalle = data;

  var html = '<div class="page">';

  // Header
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">';
  html += '<button class="btn btn-ghost btn-sm" onclick="navigateTo(\'dashboard\')">← Volver</button>';
  html += '</div>';

  html += '<div class="card" style="margin-bottom:18px">';
  html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">';
  html += '<div>';
  html += '<h2 style="font-size:1.4rem;font-weight:700;margin-bottom:4px">' + esc(data.propiedad) + '</h2>';
  html += '<div style="color:var(--text-muted);font-size:0.88rem">';
  if (data.lugar) html += '📍 ' + esc(data.lugar) + ' ';
  if (data.fecha) html += '· 📅 ' + esc(data.fecha) + ' ';
  html += '</div>';
  html += '</div>';
  html += '<div style="text-align:right">';
  html += urgenciaBadge(data.urgencia);
  if (data.emailHabilitado) html += '<div style="margin-top:4px;font-size:0.78rem;color:var(--green)">📧 Emails ON</div>';
  html += '</div>';
  html += '</div>';

  // Progress
  html += '<div style="margin-top:14px">';
  html += '<div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">';
  html += '<span>Progreso</span><span style="font-weight:700">' + data.porcentaje + '% (' + data.completas + '/' + data.total + ')</span>';
  html += '</div>';
  html += progressBar(data.porcentaje);
  html += '</div>';

  // Admin actions
  if (state.user && state.user.esAdmin) {
    html += '<div style="margin-top:14px;display:flex;gap:8px">';
    html += '<button class="btn btn-danger btn-sm" onclick="archivarDesdeWeb(\'' + esc(data.hoja) + '\')">📦 Archivar</button>';
    html += '</div>';
  }
  html += '</div>';

  // Secciones
  for (var s = 0; s < data.secciones.length; s++) {
    var sec = data.secciones[s];
    var secCompletas = 0;
    for (var x = 0; x < sec.tareas.length; x++) { if (sec.tareas[x].completa) secCompletas++; }

    html += '<div class="card" style="margin-bottom:12px">';
    html += '<div class="seccion-header open" onclick="this.classList.toggle(\'open\');this.nextElementSibling.style.display=this.classList.contains(\'open\')?\'block\':\'none\'">';
    html += '<span class="seccion-arrow">▸</span>';
    html += '<strong>' + esc(sec.nombre) + '</strong>';
    html += '<span style="margin-left:auto;font-size:0.78rem;color:var(--text-muted)">' + secCompletas + '/' + sec.tareas.length + '</span>';
    html += '</div>';
    html += '<div class="seccion-body">';

    for (var t = 0; t < sec.tareas.length; t++) {
      var tarea = sec.tareas[t];
      html += '<div class="tarea-row">';

      // Número de fila
      html += '<span class="tarea-fila">' + tarea.fila + '</span>';

      // Check / status
      if (tarea.completa) {
        html += '<div class="tarea-check done">✓</div>';
      } else if (tarea.tipo === 'CHECK') {
        html += '<div class="tarea-check" onclick="completarDesdeDetalle(\'' + esc(data.hoja) + '\',' + tarea.fila + ',this)" title="Completar">✓</div>';
      } else {
        html += '<div class="tarea-check" style="border-color:var(--yellow);color:var(--yellow);font-size:0.7rem" onclick="promptDatoDetalle(\'' + esc(data.hoja) + '\',' + tarea.fila + ',\'' + esc(tarea.tarea).replace(/'/g, "\\'") + '\')" title="Ingresar dato">✎</div>';
      }

      // Text — tachar solo CHECK, DATO/PREGUNTA muestran la respuesta sin tachar
      var tacharTexto = tarea.completa && tarea.tipo === 'CHECK';
      html += '<div class="tarea-texto' + (tacharTexto ? ' done' : '') + '">' + esc(tarea.tarea);
      if (tarea.completa && tarea.estado && tarea.tipo !== 'CHECK') {
        html += ' <span style="color:var(--green);font-size:0.82rem">→ ' + esc(tarea.estado) + '</span>';
      }
      if (tarea.observaciones) {
        html += '<div class="tarea-obs">📝 ' + esc(tarea.observaciones) + '</div>';
      }
      html += '</div>';

      // [NEW] Meta wrapped in .tarea-meta for mobile
      html += '<div class="tarea-meta">';
      html += '<span class="tarea-resp">' + esc(tarea.responsable) + '</span>';
      // AVISAR — editable
      var avisarVal = tarea.avisar || '';
      html += '<span class="badge ' + (avisarVal ? 'badge-yellow' : 'badge-muted') + '" style="cursor:pointer" onclick="editarAvisar(\'' + esc(data.hoja) + '\',' + tarea.fila + ',\'' + esc(avisarVal) + '\')" title="Avisar: notifica a esta fila cuando se completa la fila indicada. Click para editar.">';
      html += '📢 ' + (avisarVal ? avisarVal : '—');
      html += '</span>';
      // EMAIL CHECK — toggle columna F
      var emailOn = tarea.emailCheck;
      html += '<span class="badge ' + (emailOn ? 'badge-green' : 'badge-muted') + '" style="cursor:pointer;font-size:0.78rem" onclick="toggleEmailCheck(\'' + esc(data.hoja) + '\',' + tarea.fila + ',' + !emailOn + ')" title="' + (emailOn ? 'Email activo — click para silenciar' : 'Email silenciado — click para activar') + '">';
      html += emailOn ? '🔔' : '🔕';
      html += '</span>';
      html += '<span class="badge badge-muted">' + esc(tarea.tipo) + '</span>';
      if (tarea.timestamp) {
        html += '<span class="tarea-ts">' + esc(tarea.timestamp) + '</span>';
      }
      html += '</div>'; // close tarea-meta

      html += '</div>'; // close tarea-row
    }

    html += '</div></div>';
  }

  html += '</div>';
  document.getElementById('view-container').innerHTML = html;
}

function completarDesdeDetalle(hoja, fila, el) {
  el.classList.add('done');
  el.parentElement.querySelector('.tarea-texto').classList.add('done');
  api('webCompletarTarea', [hoja, fila])
    .then(function(r) {
      if (r.success) { showToast('✅ Tarea completada', 'success'); refreshBadgeTareas(); }
      else showToast('⚠️ ' + r.mensaje, 'error');
    });
}

function promptDatoDetalle(hoja, fila, nombreTarea) {
  showModal({
    title: '✏️ Ingresar dato',
    message: nombreTarea,
    input: true,
    placeholder: 'Escribí el valor...',
    okText: 'Guardar'
  }).then(function(valor) {
    if (valor === null) return;
    api('webCompletarTareaDato', [hoja, fila, valor])
      .then(function(r) {
        if (r.success) {
          showToast('✅ Dato grabado', 'success');
          loadDetalle(hoja);
          refreshBadgeTareas();
        } else showToast('⚠️ ' + r.mensaje, 'error');
      });
  });
}

function archivarDesdeWeb(hoja) {
  showModal({
    title: '📦 Archivar boleto',
    message: '¿Archivar este boleto? La hoja será eliminada del spreadsheet.',
    dangerOk: true,
    okText: 'Archivar'
  }).then(function(val) {
    if (val === null) return;
    api('webArchivarBoleto', [hoja])
      .then(function(r) {
        if (r.success) {
          showToast('✅ ' + r.mensaje, 'success');
          navigateTo('dashboard');
        } else showToast('⚠️ ' + r.mensaje, 'error');
      });
  });
}

function editarAvisar(hoja, fila, valorActual) {
  showModal({
    title: '📢 Columna AVISAR (fila ' + fila + ')',
    message: 'Ingresá el número de fila que debe completarse antes de notificar esta tarea.<br>Dejá vacío para quitar.',
    input: true,
    inputValue: valorActual,
    placeholder: 'Nro. de fila...',
    okText: 'Guardar'
  }).then(function(nuevo) {
    if (nuevo === null) return;
    api('webEditarAvisar', [hoja, fila, nuevo.trim()])
      .then(function(r) {
        if (r.success) {
          showToast('✅ AVISAR actualizado', 'success');
          loadDetalle(hoja);
        } else showToast('⚠️ ' + r.mensaje, 'error');
      })
      .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
  });
}

function toggleEmailCheck(hoja, fila, nuevoValor) {
  api('webToggleEmailCheck', [hoja, fila, nuevoValor])
    .then(function(r) {
      if (r.success) {
        showToast(r.valor ? '🔔 Email activado' : '🔕 Email silenciado', 'success');
        loadDetalle(hoja);
      } else showToast('⚠️ Error', 'error');
    })
    .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

// ============================================================
// VIEW: EQUIPO (ABM) — [CHANGED] data-label en <td>
// ============================================================
function loadEquipo() {
  var actions = '';
  if (state.user && state.user.esAdmin) {
    actions = '<button class="btn btn-primary btn-sm" onclick="mostrarFormIntegrante()">➕ Agregar</button>';
  }
  document.getElementById('topbar-actions').innerHTML = actions;
  api('webGetEquipoConFilas').then(renderEquipo);
}

function renderEquipo(data) {
  var esAdmin = state.user && state.user.esAdmin;
  var html = '<div class="page">';
  if (data.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">👥</div><p>No hay integrantes en el equipo</p></div>';
  } else {
    html += '<div class="card"><div class="card-header"><div class="card-title">' + data.length + ' integrantes</div></div>';
    html += '<div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th>';
    if (esAdmin) html += '<th style="width:100px">Acciones</th>';
    html += '</tr></thead><tbody>';
    for (var i = 0; i < data.length; i++) {
      var m = data[i];
      var rolBadge = m.rol === 'Administrador' ? 'badge-green' : 'badge-muted';
      html += '<tr>';
      html += '<td data-label="Nombre"><strong>' + esc(m.nombre) + '</strong></td>';
      html += '<td data-label="Email" style="font-family:JetBrains Mono,monospace;font-size:0.82rem;word-break:break-all">' + esc(m.email) + '</td>';
      html += '<td data-label="Rol"><span class="badge ' + rolBadge + '">' + esc(m.rol) + '</span></td>';
      html += '<td data-label="Estado">' + esc(m.area) + '</td>';
      if (esAdmin) {
        html += '<td data-label="Acciones" style="white-space:nowrap">';
        html += '<button class="btn btn-ghost btn-sm" style="padding:3px 8px" onclick="mostrarFormIntegrante(' + m.fila + ',\'' + esc(m.nombre) + '\',\'' + esc(m.email) + '\',\'' + esc(m.rol) + '\',\'' + esc(m.area) + '\')">✏️</button> ';
        html += '<button class="btn btn-danger btn-sm" style="padding:3px 8px" onclick="eliminarIntegrante(' + m.fila + ',\'' + esc(m.nombre) + '\')">🗑</button>';
        html += '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  }
  html += '</div>';
  document.getElementById('view-container').innerHTML = html;
}

function mostrarFormIntegrante(fila, nombre, email, rol, area) {
  var esEditar = !!fila;
  var bodyHtml = '';
  bodyHtml += '<div class="form-group"><label class="form-label">Nombre *</label>';
  bodyHtml += '<input class="form-input" id="eq-nombre" value="' + (nombre || '') + '"></div>';
  bodyHtml += '<div class="form-group"><label class="form-label">Email *</label>';
  bodyHtml += '<input class="form-input" id="eq-email" type="email" value="' + (email || '') + '"></div>';
  bodyHtml += '<div class="form-group"><label class="form-label">Rol</label>';
  bodyHtml += '<select class="form-select" id="eq-rol">';
  bodyHtml += '<option value="Integrante"' + ((rol || '') !== 'Administrador' ? ' selected' : '') + '>Integrante</option>';
  bodyHtml += '<option value="Administrador"' + (rol === 'Administrador' ? ' selected' : '') + '>Administrador</option>';
  bodyHtml += '</select></div>';
  bodyHtml += '<div class="form-group"><label class="form-label">Estado</label>';
  bodyHtml += '<select class="form-select" id="eq-area">';
  bodyHtml += '<option value="Activo"' + ((area || '') !== 'Inactivo' ? ' selected' : '') + '>Activo</option>';
  bodyHtml += '<option value="Inactivo"' + (area === 'Inactivo' ? ' selected' : '') + '>Inactivo</option>';
  bodyHtml += '</select></div>';

  document.getElementById('modal-title').textContent = esEditar ? '✏️ Editar integrante' : '➕ Nuevo integrante';
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-btn-ok').textContent = esEditar ? 'Guardar' : 'Agregar';
  document.getElementById('modal-btn-ok').className = 'btn btn-primary';
  document.getElementById('modal-btn-cancel').textContent = 'Cancelar';
  document.getElementById('modal-overlay').style.display = 'flex';

  // Override modal OK
  _modalResolve = function(val) {
    if (val === null) return;
    var n = document.getElementById('eq-nombre').value.trim();
    var e = document.getElementById('eq-email').value.trim();
    var r = document.getElementById('eq-rol').value;
    var a = document.getElementById('eq-area').value;
    if (!n || !e) { showToast('⚠️ Nombre y email son obligatorios', 'error'); return; }

    if (esEditar) {
      api('webEditarIntegrante', [fila, n, e, r, a])
        .then(function(res) {
          if (res.success) { showToast('✅ ' + res.mensaje, 'success'); loadEquipo(); }
          else showToast('⚠️ ' + res.mensaje, 'error');
        })
        .catch(function(err) { showToast('Error: ' + err.message, 'error'); });
    } else {
      api('webAgregarIntegrante', [n, e, r, a])
        .then(function(res) {
          if (res.success) { showToast('✅ ' + res.mensaje, 'success'); loadEquipo(); }
          else showToast('⚠️ ' + res.mensaje, 'error');
        })
        .catch(function(err) { showToast('Error: ' + err.message, 'error'); });
    }
  };

  setTimeout(function() { document.getElementById('eq-nombre').focus(); }, 100);
}

function eliminarIntegrante(fila, nombre) {
  showModal({
    title: '🗑 Eliminar integrante',
    message: '¿Eliminar a <strong>' + nombre + '</strong> del equipo?',
    dangerOk: true,
    okText: 'Eliminar'
  }).then(function(val) {
    if (val === null) return;
    api('webEliminarIntegrante', [fila])
      .then(function(res) {
        if (res.success) { showToast('✅ ' + res.mensaje, 'success'); loadEquipo(); }
        else showToast('⚠️ ' + res.mensaje, 'error');
      })
      .catch(function(err) { showToast('Error: ' + err.message, 'error'); });
  });
}

// ============================================================
// VIEW: ARCHIVO — [CHANGED] data-label en <td>
// ============================================================
function loadArchivo() {
  document.getElementById('topbar-actions').innerHTML = '';
  api('webGetArchivo').then(renderArchivo);
}

function renderArchivo(data) {
  var html = '<div class="page">';
  if (data.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">📦</div><p>No hay boletos archivados</p></div>';
  } else {
    html += '<div class="card"><div class="card-header"><div class="card-title">' + data.length + ' boletos archivados</div></div>';
    html += '<div class="table-wrap"><table><thead><tr><th>Boleto</th><th>Propiedad</th><th>Progreso</th><th>Fecha</th><th>Archivado por</th></tr></thead><tbody>';
    for (var i = 0; i < data.length; i++) {
      var a = data[i];
      html += '<tr>';
      html += '<td data-label="Boleto"><strong>' + esc(a.boleto) + '</strong></td>';
      html += '<td data-label="Propiedad">' + esc(a.propiedad) + '</td>';
      html += '<td data-label="Progreso">' + esc(a.progreso) + '</td>';
      html += '<td data-label="Fecha" style="font-family:JetBrains Mono,monospace;font-size:0.82rem">' + esc(a.fechaArchivo) + '</td>';
      html += '<td data-label="Archivado por">' + esc(a.archivadoPor) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  }
  html += '</div>';
  document.getElementById('view-container').innerHTML = html;
}

// ============================================================
// VIEW: REPORTES — [CHANGED] data-label en <td>
// ============================================================
function loadReportes() {
  document.getElementById('topbar-actions').innerHTML = '';
  api('webGetReportes').then(renderReportes);
}

function renderReportes(data) {
  var html = '<div class="page">';

  // Por responsable
  html += '<div class="card" style="margin-bottom:18px">';
  html += '<div class="card-header"><div class="card-title">📊 Rendimiento por responsable</div></div>';
  if (data.porResponsable.length > 0) {
    html += '<div class="table-wrap"><table><thead><tr><th>Responsable</th><th>Completas</th><th>Total</th><th>%</th><th>Progreso</th></tr></thead><tbody>';
    data.porResponsable.sort(function(a,b){ return b.porcentaje - a.porcentaje; });
    for (var i = 0; i < data.porResponsable.length; i++) {
      var r = data.porResponsable[i];
      html += '<tr>';
      html += '<td data-label="Responsable"><strong>' + esc(r.nombre) + '</strong></td>';
      html += '<td data-label="Completas" style="color:var(--green)">' + r.completas + '</td>';
      html += '<td data-label="Total">' + r.total + '</td>';
      html += '<td data-label="%"><strong>' + r.porcentaje + '%</strong></td>';
      html += '<td data-label="Progreso" style="min-width:100px">' + progressBar(r.porcentaje) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  } else {
    html += '<div class="empty-state"><p>Sin datos</p></div>';
  }
  html += '</div>';

  // Por sección
  html += '<div class="card" style="margin-bottom:18px">';
  html += '<div class="card-header"><div class="card-title">📋 Progreso por sección</div></div>';
  if (data.porSeccion.length > 0) {
    html += '<div class="table-wrap"><table><thead><tr><th>Sección</th><th>Completas</th><th>Total</th><th>%</th><th>Progreso</th></tr></thead><tbody>';
    data.porSeccion.sort(function(a,b){ return b.porcentaje - a.porcentaje; });
    for (var j = 0; j < data.porSeccion.length; j++) {
      var s = data.porSeccion[j];
      html += '<tr>';
      html += '<td data-label="Sección"><strong>' + esc(s.nombre) + '</strong></td>';
      html += '<td data-label="Completas" style="color:var(--green)">' + s.completas + '</td>';
      html += '<td data-label="Total">' + s.total + '</td>';
      html += '<td data-label="%"><strong>' + s.porcentaje + '%</strong></td>';
      html += '<td data-label="Progreso" style="min-width:100px">' + progressBar(s.porcentaje) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }
  html += '</div>';

  // Timeline
  html += '<div class="card">';
  html += '<div class="card-header"><div class="card-title">🕐 Actividad reciente (últimas 50)</div></div>';
  if (data.timeline.length > 0) {
    html += '<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Responsable</th><th>Tarea</th><th>Boleto</th></tr></thead><tbody>';
    for (var k = 0; k < data.timeline.length; k++) {
      var ev = data.timeline[k];
      html += '<tr>';
      html += '<td data-label="Fecha" style="font-family:JetBrains Mono,monospace;font-size:0.82rem;white-space:nowrap">' + esc(ev.fecha) + '</td>';
      html += '<td data-label="Responsable">' + esc(ev.responsable) + '</td>';
      html += '<td data-label="Tarea">' + esc(ev.tarea) + '</td>';
      html += '<td data-label="Boleto" style="color:var(--text-muted)">' + esc(ev.boleto) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  } else {
    html += '<div class="empty-state"><p>Sin actividad registrada</p></div>';
  }
  html += '</div>';

  html += '</div>';
  document.getElementById('view-container').innerHTML = html;
}
</script>
</body>
</html>
